upstream phi4_api {
    server phi4-api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=phi4_limit:10m rate=10r/m;
    limit_req zone=phi4_limit burst=5 nodelay;

    client_max_body_size 1m;
    proxy_read_timeout 120s;    # Model inference can take up to 60s

    location /api/ {
        proxy_pass http://phi4_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /health {
        proxy_pass http://phi4_api/api/v1/health;
        access_log off;
    }

    location /docs {
        proxy_pass http://phi4_api/docs;
    }
}
