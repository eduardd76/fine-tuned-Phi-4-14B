version: "3.9"

services:
  phi4-api:
    build:
      context: ../..
      dockerfile: deployment_artifacts/docker/Dockerfile.api
    image: phi4-network-architect:latest
    container_name: phi4-api
    ports:
      - "8000:8000"
    volumes:
      - /data/models:/models:ro          # Read-only model mount
      - /data/logs:/app/logs
    environment:
      - VIRTUAL_ARCHITECT_MODEL=/models/phi4-network-architect
      - PHI4_API_KEY=${PHI4_API_KEY:-phi4-key-change-me}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-30}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  phi4-mcp:
    build:
      context: ../..
      dockerfile: deployment_artifacts/docker/Dockerfile.api
    container_name: phi4-mcp
    command: python3.11 dream_team_integration/mcp_server.py
    ports:
      - "5555:5555"
    volumes:
      - /data/models:/models:ro
    environment:
      - VIRTUAL_ARCHITECT_MODEL=/models/phi4-network-architect
      - MCP_API_KEY=${MCP_API_KEY:-dev-key-123}
      - MCP_SERVER_PORT=5555
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/phi4-api.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - phi4-api
    restart: unless-stopped
